<!DOCTYPE html>
<html>
<head>
<title>AI Smart Contract Risk Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="loading" class="loading" style="display:none;">Analyzing contract with AI... 🔄</div>

<h1>AI Smart Contract Risk Dashboard</h1>

<div class="dashboard-container">
  <div class="dashboard-grid">
    <div id="dropArea" class="upload-card card drop-zone">
      <h2>📤 Upload Contract (Drag & Drop)</h2>
      <input type="file" id="fileInput" accept=".pdf,.docx,.txt">
      <button id="analyzeBtn">Analyze Contract</button>
    </div>

    <div class="results-grid">
      <div class="card">
        <h2>Risk Level</h2>
        <p id="riskLevel">-</p>
      </div>

      <div class="card">
        <h2>Risk Score</h2>
        <p id="riskScore">-</p>
      </div>

      <div class="card">
        <h2>Clause Detection</h2>
        <ul id="clauses"></ul>
      </div>

      <div class="card full-width">
        <h2>AI Summary</h2>
        <p id="summary" class="summary"></p>
      </div>

      <div class="card full-width">
        <h2>Risk Visualization</h2>
        <canvas id="riskChart" width="400" height="400"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="js/script.js"></script>

</body>
</html>
