<!DOCTYPE html>
<html>

<head>

<title>AI Smart Contract Analyzer</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
text-align:center;
}

.container{
margin-top:100px;
}

.upload-box{
border:2px dashed #38bdf8;
padding:40px;
border-radius:10px;
width:400px;
margin:auto;
cursor:pointer;
}

button{
margin-top:20px;
padding:10px 25px;
border:none;
background:#38bdf8;
color:white;
border-radius:8px;
cursor:pointer;
}

.loader{
margin-top:20px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Smart Contract Analyzer</h1>

<div class="upload-box" onclick="document.getElementById('fileInput').click()">

<p>Drag & Drop Contract or Click to Upload</p>

<input type="file" id="fileInput" hidden>

</div>

<button onclick="uploadContract()">Analyze Contract</button>

<div class="loader" id="loader">
AI analyzing contract...
</div>

</div>

<script src="js/script.js"></script>

</body>

</html>
